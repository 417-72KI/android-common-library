name: pr
on:
  pull_request:
    types: [ opened, synchronize, edited ]
    paths-ignore:
      - README.md
      - LICENSE
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
env:
  GITHUB_USER: ${{ secrets.GITHUB_ACTOR }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: 21
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Set up Ruby from .ruby-version
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: build
        run: |
          ./gradlew --continue clean
          mkdir -p build/reports
          ./gradlew --continue build --stacktrace 2>build/reports/build-error-log.txt
      - name: lint and test
        if: success()
        run: ./gradlew --continue ktlintCheck lintDebug testDebug --stacktrace
      - name: 'Upload lint and test reports'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: cancelled() != true
        with:
          name: reports
          path: |
            **/build/reports
            **/build/test-results
          retention-days: 7
      - name: Run Danger
        if: cancelled() != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: bundle exec danger --remove-previous-comments --fail-on-errors=true
